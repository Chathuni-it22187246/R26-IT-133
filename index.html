<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Greenhouse Advanced Spatial Simulator</title>
    <style>
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white; height: 100vh; display: flex; flex-direction: column;
            align-items: center; justify-content: center; overflow: hidden;
        }

        .dashboard {
            background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px;
            padding: 30px; display: flex; gap: 40px; box-shadow: 0 8px 32px 0 rgba(0,0,0,0.5);
        }

        .controls { width: 250px; }
        h2 { color: #00d2ff; margin-top: 0; }
        .input-group { margin-bottom: 20px; }
        label { font-size: 14px; font-weight: bold; color: #b3cde0; }
        select {
            width: 100%; padding: 10px; margin-top: 5px; border-radius: 5px;
            background: rgba(0,0,0,0.5); color: white; border: 1px solid #00d2ff;
        }

        /* 6x6 CSS Grid */
        .grid-container {
            display: grid; grid-template-columns: repeat(6, 60px); grid-gap: 10px;
        }

        .cell {
            width: 60px; height: 60px; border-radius: 8px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            color: white; text-shadow: 1px 1px 2px black;
        }
        .cell:hover { transform: scale(1.1); box-shadow: 0 0 15px white; z-index: 10; }

        /* Popup Modal */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 100;
        }
        .modal-content {
            background: #203a43; padding: 30px; border-radius: 15px; width: 300px;
            border: 1px solid #00d2ff; text-align: center;
        }
        .modal input { width: 80%; margin: 10px 0; }
        .btn {
            background: #00d2ff; color: black; border: none; padding: 10px 20px;
            border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px;
        }

        /* NEW: Notification Toast System */
        #notification-area {
            position: fixed; top: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px; z-index: 1000;
        }
        .toast {
            background: #28a745; color: white; padding: 15px 25px; border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3); font-weight: bold;
            opacity: 0; transform: translateX(50px); animation: slideIn 0.3s forwards, fadeOut 0.5s 4s forwards;
        }
        @keyframes slideIn { to { opacity: 1; transform: translateX(0); } }
        @keyframes fadeOut { to { opacity: 0; transform: translateX(50px); } }

    </style>
</head>
<body>

    <div id="notification-area"></div>

    <div class="dashboard">
        <div class="controls">
            <h2>Spatial Heatmap</h2>
            
            <div class="input-group">
                <label>Season</label>
                <select id="season" onchange="changeSeason()">
                    <option value="Moderate">Moderate</option>
                    <option value="Dry">Dry</option>
                    <option value="Rainy">Rainy</option>
                </select>
            </div>

            <div class="input-group">
                <label>Harvest Cycle Phase</label>
                <select id="harvest_stage" onchange="sendData()">
                    <option value="Seedling">Seedling (Sprouting)</option>
                    <option value="Vegetative" selected>Vegetative (Growing)</option>
                    <option value="Flowering">Flowering (Sensitive)</option>
                    <option value="Harvesting">Harvesting Phase</option>
                </select>
            </div>

            <p style="font-size: 12px; color: #aaa; margin-top: 20px;">
                Change the Season to auto-update all zones, or click a specific square to edit it manually.
            </p>
        </div>

        <div class="grid-container" id="sensorGrid"></div>
    </div>

    <div class="modal" id="editModal">
        <div class="modal-content">
            <h3 id="modalTitle">Edit Zone</h3>
            <label>Temperature (°C)</label>
            <input type="range" id="modalTemp" min="5" max="50" oninput="document.getElementById('tempVal').innerText=this.value">
            <span id="tempVal"></span>°C<br><br>
            
            <label>Soil Moisture (%)</label>
            <input type="range" id="modalSoil" min="0" max="100" oninput="document.getElementById('soilVal').innerText=this.value">
            <span id="soilVal"></span>%<br>
            
            <button class="btn" onclick="saveCell()">Apply to Zone</button>
        </div>
    </div>

    <script>
        let gridData = {};
        let currentEditingZone = "";
        let activeTimers = {}; 
        const rows = ['A', 'B', 'C', 'D', 'E', 'F'];

        function initGrid() {
            const gridDiv = document.getElementById("sensorGrid");
            for (let r = 0; r < 6; r++) {
                for (let c = 1; c <= 6; c++) {
                    let zoneId = rows[r] + c;
                    gridData[zoneId] = { temp: 25, soil: 60 }; 
                    let cell = document.createElement("div");
                    cell.className = "cell";
                    cell.id = "cell-" + zoneId;
                    cell.onclick = () => openModal(zoneId);
                    gridDiv.appendChild(cell);
                }
            }
            changeSeason(); 
        }

        function changeSeason() {
            let season = document.getElementById("season").value;
            for (let r = 0; r < 6; r++) {
                for (let c = 1; c <= 6; c++) {
                    let zoneId = rows[r] + c;
                    if (season === "Dry") {
                        gridData[zoneId].temp = Math.floor(Math.random() * 7) + 30; 
                        gridData[zoneId].soil = Math.floor(Math.random() * 16) + 30; 
                    } else if (season === "Rainy") {
                        gridData[zoneId].temp = Math.floor(Math.random() * 7) + 18; 
                        gridData[zoneId].soil = Math.floor(Math.random() * 21) + 70; 
                    } else {
                        gridData[zoneId].temp = Math.floor(Math.random() * 5) + 24; 
                        gridData[zoneId].soil = Math.floor(Math.random() * 21) + 50; 
                    }
                }
            }
            updateGridVisuals();
            sendData();
        }

        function updateGridVisuals() {
            for (const [zone, data] of Object.entries(gridData)) {
                let cell = document.getElementById("cell-" + zone);
                cell.innerHTML = `${zone}<br>${data.temp}°C`;

                if (data.temp < 18) cell.style.background = "#005c99"; 
                else if (data.temp <= 30) cell.style.background = "#28a745"; 
                else if (data.temp <= 35) cell.style.background = "#ff9800"; 
                else cell.style.background = "#dc3545"; 
            }
        }

        function openModal(zoneId) {
            currentEditingZone = zoneId;
            document.getElementById("modalTitle").innerText = "Edit Zone " + zoneId;
            document.getElementById("modalTemp").value = gridData[zoneId].temp;
            document.getElementById("tempVal").innerText = gridData[zoneId].temp;
            document.getElementById("modalSoil").value = gridData[zoneId].soil;
            document.getElementById("soilVal").innerText = gridData[zoneId].soil;
            document.getElementById("editModal").style.display = "flex";
        }

        function saveCell() {
            if (activeTimers[currentEditingZone]) {
                clearTimeout(activeTimers[currentEditingZone]);
                delete activeTimers[currentEditingZone];
            }
            gridData[currentEditingZone].temp = parseInt(document.getElementById("modalTemp").value);
            gridData[currentEditingZone].soil = parseInt(document.getElementById("modalSoil").value);
            document.getElementById("editModal").style.display = "none";
            updateGridVisuals();
            sendData();
        }

        function sendData() {
            const payload = {
                season: document.getElementById("season").value,
                harvest_stage: document.getElementById("harvest_stage").value, 
                sensors: gridData
            };

            fetch('http://127.0.0.1:5000/simulate_grid', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if (data.alerts && data.alerts.length > 0) {
                    data.alerts.forEach(alert => {
                        // Start a timer to Auto-Heal
                        if (!activeTimers[alert.zone]) {
                            activeTimers[alert.zone] = setTimeout(() => {
                                autoHealZone(alert.zone);
                            }, alert.action_duration * 1000); 
                        }
                    });
                }
            });
        }

        function autoHealZone(zone) {
            let season = document.getElementById("season").value;
            
            // Revert to optimal conditions based on season
            if (season === "Dry") {
                gridData[zone].temp = 32; gridData[zone].soil = 40; 
            } else if (season === "Rainy") {
                gridData[zone].temp = 22; gridData[zone].soil = 80; 
            } else {
                gridData[zone].temp = 25; gridData[zone].soil = 60; 
            }

            delete activeTimers[zone]; 
            updateGridVisuals();       
            sendData();                

            // NEW: Show UI Notification
            showNotification(`✅ Zone ${zone} has successfully recovered!`);
        }

        function showNotification(msg) {
            let container = document.getElementById("notification-area");
            let toast = document.createElement("div");
            toast.className = "toast";
            toast.innerText = msg;
            container.appendChild(toast);
            
            // Remove from DOM after animation finishes (4.5s total)
            setTimeout(() => { toast.remove(); }, 4500);
        }

        initGrid();
    </script>
</body>
</html>
